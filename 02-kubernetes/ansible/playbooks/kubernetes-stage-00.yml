---
- name: "K8s : stage-a"
  become: true
  hosts: all

  handlers:
    - name: "K8s : stage-a : reboot"
      ansible.builtin.reboot:
        reboot_timeout: 300

  tasks:
    - name: "K8s : stage-a : install packages"
      ansible.builtin.apt:
        update_cache: true
        state: present
        name:
          - software-properties-common
          - apt-transport-https
          - ca-certificates
          - curl
          - ufw

    - name: "K8s : stage-a : load kernel modules"
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: "K8s : stage-a : add kernel modules"
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/kubernetes-cri.conf

    - name: "K8s : stage-a : config config"
      ansible.builtin.copy:
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
      notify: "K8s : stage-a : reboot"
