---
- name: "K8s : stage-c"
  become: true
  hosts: all

  vars_files:
    - "../group_vars/common.yml"

  tasks:
    - name: "K8s : stage-c : get key file"
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v{{ ver_kubernetes }}/deb/Release.key
        dest: /tmp/kubernetes-release.key
        mode: 0644
    
    - name: "K8s : stage-c : add key"
      ansible.builtin.shell:
        cmd: sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg < /tmp/kubernetes-release.key
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: "K8s : stage-c : add repo"
      ansible.builtin.apt_repository:
        state: present
        filename: kubernetes.list
        repo: deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ ver_kubernetes }}/deb/ /
    
    - name: "K8s : stage-c : remove key file"
      ansible.builtin.file:
        state: absent
        path: /tmp/kubernetes-release.key

    - name: "K8s : stage-c : get kubelet, kubeadm, kubectl"
      ansible.builtin.apt:
        update_cache: true
        state: present
        name:
          - kubelet
          - kubeadm
          - kubectl

    - name: "K8s : stage-c : hold kubelet, kubeadm, kubectl"
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl
