---
- name: "K8s : helm"
  hosts: localhost
  become: false
  gather_facts: false

  vars_files: "../group_vars/common.yml"

  vars:
    helm_url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    prometheus_repo: https://prometheus-community.github.io/helm-charts
    ingress_repo: https://kubernetes.github.io/ingress-nginx

  tasks:
    - name: "K8s : helm : check kubeconfig"
      ansible.builtin.stat:
        path: "{{ kubeconfig_local }}"
      register: kubeconfig

    - name: "K8s : helm : fail if kubeconfig missing"
      ansible.builtin.fail:
        msg: "kubeconfig not found"
      when: not kubeconfig.stat.exists

    - name: "K8s : helm : check if installed"
      ansible.builtin.command:
        cmd: command -v helm
      register: helm_installed
      failed_when: false
      changed_when: false

    - block:
      - name: "K8s : helm : get install script"
        ansible.builtin.get_url:
          url: "{{ helm_url }}"
          dest: /tmp/helm.sh
          mode: 0755

      - name: "K8s : helm : exec install script"
        ansible.builtin.command:
          cmd: /tmp/helm.sh
        register: helm_install_result
        changed_when: true
      
      when: helm_installed.rc != 0
      
      always:
        - name: "K8s : helm : delete install script"
          ansible.builtin.file:
            path: /tmp/helm.sh
            state: absent
          changed_when: false

    - name: "K8s : helm : install prometheus repo"
      kubernetes.core.helm_repository:
        name: prometheus-community
        repo_url: "{{ prometheus_repo }}"
        kubeconfig: "{{ kubeconfig_local }}"

    - name: "K8s : helm : update repo"
      ansible.builtin.command:
        cmd: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig_local }}"
      changed_when: false

    - name: "K8s : helm : install prometheus"
      kubernetes.core.helm:
        name: kube-prometheus-stack
        namespace: monitoring
        create_namespace: true
        chart_ref: "prometheus-community/kube-prometheus-stack"
        chart_version: "{{ prometheus_version }}"
        kubeconfig: "{{ kubeconfig_local }}"
        values: "{{ lookup('template', 'templates/prometheus-values.yml.j2') | from_yaml }}"

    - name: "K8s : helm : install ingress repo"
      kubernetes.core.helm_repository:
        name: ingress-nginx
        repo_url: "{{ ingress_repo }}"
        kubeconfig: "{{ kubeconfig_local }}"

    - name: "K8s : helm : update repo"
      ansible.builtin.command:
        cmd: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig_local }}"
      changed_when: false

    - name: "K8s : helm : install ingress"
      kubernetes.core.helm:
        name: ingress-nginx
        namespace: ingress-nginx
        create_namespace: true
        chart_ref: "ingress-nginx/ingress-nginx"
        chart_version: "{{ ingress_version }}"
        kubeconfig: "{{ kubeconfig_local }}"
        values: "{{ lookup('template', 'templates/ingress-values.yml.j2') | from_yaml }}"
